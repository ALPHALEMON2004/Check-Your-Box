<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where are You ?</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
         <style>
                #map { height: 90vh; }
         </style>
        <script>
            (function () {
                const authToken = localStorage.getItem('authToken');
                if (!authToken) {
                    localStorage.setItem('postLoginRedirect', '/location');
                    window.location.href = '/o/authenticate?redirect_uri=/location';
                }
            })();
        </script>
</head>
<body>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <div id="map"></div>

    <script>

        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
       maxZoom: 19,
       attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);

      const socket=io();
     

      const remoteMarkers=new Map();

      socket.on("server:location-update",(data)=>{
        const {id,latitude,longitude}=data;
         
        if(!remoteMarkers.has(id)){
            const marker=L.marker([latitude,longitude]).addTo(map).bindPopup(id);
            remoteMarkers.set(id,marker);
        }else{
            const existingMarker=remoteMarkers.get(id);
            existingMarker.setLatLng([latitude,longitude]);
        }
    });

      
    
      function getUserCurrentLocation(){

        return new Promise((resolve,reject)=>{

                if("geolocation" in navigator){

            navigator.geolocation.getCurrentPosition(
                (position)=>{
            console.log("got the position",position);
            
            const latitude=position.coords.latitude;
             const longitude=position.coords.longitude;

             resolve({latitude,longitude});

                },
                (err)=>{
                    reject(err);
                },

                {enabledHighAccuracy:true}
            )

        }else{
            alert("GeoLocation is not suppported in your browser!!!")
        }
        });


      }

    //    getUserCurrentLocation().then((p)=>console.log(p));

    let mycurrentlocationmarker=null;
    async function main(){

        setInterval(async()=>{

              const {latitude,longitude}=await getUserCurrentLocation();

              socket.emit("client-location-update",{latitude,longitude});

                if(!mycurrentlocationmarker){
                    mycurrentlocationmarker=L.marker([latitude,longitude]).addTo(map).bindPopup('You are here!!!');
                }else{
                    mycurrentlocationmarker.setLatLng([latitude,longitude]);
                }

        },10*1000);

    }
    
    window.addEventListener('load', main);


    </script>


      
    
</body>
</html>
