<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eai , Tick karke dikhao</title>
    <style>
      :root {
        --bg-top: #23111f;
        --bg-bottom: #12070f;
        --panel: rgba(255, 240, 246, 0.08);
        --panel-border: rgba(255, 227, 237, 0.22);
        --text-main: #fff5f8;
        --text-soft: #ffd7e5;
        --blossom: #ff9ec2;
        --blossom-deep: #ff6da3;
        --shadow: rgba(255, 71, 149, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--text-main);
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 15% 20%, rgba(255, 187, 213, 0.25) 0 9%, transparent 24%),
          radial-gradient(circle at 85% 25%, rgba(255, 148, 189, 0.18) 0 10%, transparent 28%),
          radial-gradient(circle at 70% 85%, rgba(255, 128, 178, 0.18) 0 12%, transparent 30%),
          linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
        overflow-x: hidden;
      }

      body::selection {
        background: rgba(255, 143, 191, 0.35);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -20%;
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        background:
          linear-gradient(rgba(26, 9, 18, 0.58), rgba(26, 9, 18, 0.68)),
          /* url("https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=1800&q=80"), */
          radial-gradient(8px 8px at 12% 24%, rgba(255, 188, 214, 0.75), transparent 70%),
          radial-gradient(7px 7px at 28% 62%, rgba(255, 205, 224, 0.7), transparent 70%),
          radial-gradient(9px 9px at 44% 18%, rgba(255, 165, 201, 0.72), transparent 70%),
          radial-gradient(6px 6px at 63% 34%, rgba(255, 200, 223, 0.7), transparent 70%),
          radial-gradient(8px 8px at 82% 74%, rgba(255, 168, 203, 0.7), transparent 70%);
        background-size: cover, cover, auto, auto, auto, auto, auto;
        background-position: center, center, center, center, center, center, center;
        background-repeat: no-repeat;
        mix-blend-mode: screen;
        animation: sakura-drift-1 14s linear infinite;
      }

      body::after {
        background:
          linear-gradient(rgba(18, 7, 15, 0.72), rgba(18, 7, 15, 0.72)),
          /* url("https://images.unsplash.com/photo-1496065187959-7f07b8353c55?auto=format&fit=crop&w=1800&q=80"), */
          radial-gradient(8px 8px at 18% 72%, rgba(255, 191, 217, 0.62), transparent 70%),
          radial-gradient(7px 7px at 35% 42%, rgba(255, 172, 206, 0.64), transparent 70%),
          radial-gradient(9px 9px at 55% 77%, rgba(255, 200, 223, 0.62), transparent 70%),
          radial-gradient(6px 6px at 76% 27%, rgba(255, 156, 196, 0.66), transparent 70%),
          radial-gradient(7px 7px at 90% 56%, rgba(255, 193, 219, 0.64), transparent 70%);
        background-size: cover, cover, auto, auto, auto, auto, auto;
        background-position: center, center, center, center, center, center, center;
        background-repeat: no-repeat;
        mix-blend-mode: lighten;
        animation: sakura-drift-2 18s linear infinite;
      }

      .cursor-glow {
        position: fixed;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 3;
        left: 0;
        top: 0;
        opacity: 0;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(255, 172, 207, 0.151) 0%, rgba(255, 146, 191, 0.3) 30%, rgba(255, 136, 182, 0.08) 58%, transparent 72%);
        transition: opacity 0.2s ease;
      }

      .error-banner {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 4;
        min-width: min(92vw, 420px);
        padding: 14px 18px;
        border-radius: 14px;
        border: 1px solid rgba(255, 188, 204, 0.35);
        background: rgba(54, 12, 28, 0.92);
        color: #fff3f7;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(8px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .error-banner.is-visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
      }

      .error-banner strong {
        display: block;
        margin-bottom: 4px;
        font-size: 0.92rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .error-banner span {
        display: block;
        line-height: 1.4;
        color: #ffd6e4;
      }

      .petal {
        position: fixed;
        width: 12px;
        height: 9px;
        left: 0;
        top: 0;
        pointer-events: none;
        z-index: 2;
        opacity: 0.9;
        border-radius: 70% 55% 70% 55%;
        background: linear-gradient(145deg, rgba(255, 217, 231, 0.95), rgba(255, 149, 194, 0.92));
        box-shadow: 0 0 8px rgba(255, 165, 203, 0.45);
        transform: translate(-50%, -50%) rotate(0deg);
        animation: petal-fade 1.2s ease-out forwards;
      }

      @keyframes petal-fade {
        0% {
          opacity: 0.95;
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
        }
        100% {
          opacity: 0;
          transform: translate(calc(-50% + var(--drift-x, 20px)), calc(-50% + var(--drift-y, 28px))) scale(0.35) rotate(var(--rot, 70deg));
        }
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
        color: var(--text-main);
        text-shadow: 0 6px 22px rgba(255, 130, 184, 0.35);
      }

      .top-actions {
        position: relative;
        z-index: 2;
        width: min(980px, 96vw);
        display: flex;
        justify-content: flex-end;
        margin-bottom: 12px;
      }

      .location-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 227, 237, 0.35);
        background: linear-gradient(145deg, rgba(255, 219, 234, 0.18), rgba(255, 158, 194, 0.22));
        color: var(--text-main);
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        backdrop-filter: blur(6px);
        box-shadow: 0 6px 16px rgba(10, 2, 7, 0.35);
        transition: transform 0.15s ease, box-shadow 0.2s ease;
      }

      .location-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(10, 2, 7, 0.42);
      }

      #container {
        position: relative;
        z-index: 1;
        width: min(980px, 96vw);
        min-height: 66vh;
        display: grid;
        align-content: start;
        grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
        gap: 12px;
        padding: clamp(20px, 4vw, 34px);
        border-radius: 20px;
        border: 1px solid var(--panel-border);
        background: linear-gradient(145deg, rgba(255, 219, 234, 0.1), var(--panel));
        backdrop-filter: blur(7px);
        box-shadow:
          0 14px 34px rgba(10, 2, 7, 0.48),
          0 0 0 1px rgba(255, 219, 234, 0.06) inset;
      }

      #container > script {
        display: none;
      }

      input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 24px;
        height: 24px;
        margin: 0;
        cursor: pointer;
        border-radius: 4px;
        border: 2px solid rgba(255, 235, 244, 0.95);
        background: linear-gradient(160deg, rgba(255, 246, 250, 0.22), rgba(255, 198, 224, 0.14));
        box-shadow:
          0 0 0 1px rgba(255, 132, 181, 0.55),
          0 4px 12px rgba(0, 0, 0, 0.32),
          0 0 18px rgba(255, 150, 194, 0.18);
        transition: transform 0.14s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      }

      input[type="checkbox"]:hover {
        transform: translateY(-2px) scale(1.05);
        border-color: rgba(255, 248, 252, 1);
        box-shadow:
          0 0 0 1px rgba(255, 154, 196, 0.78),
          0 6px 16px rgba(0, 0, 0, 0.34),
          0 0 24px rgba(255, 164, 205, 0.32);
      }

      input[type="checkbox"]:checked {
        border-color: rgba(255, 252, 253, 1);
        background: linear-gradient(145deg, var(--blossom), var(--blossom-deep));
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.9),
          0 0 0 3px rgba(255, 143, 191, 0.44),
          0 0 18px rgba(255, 107, 170, 0.55),
          0 8px 14px rgba(28, 6, 18, 0.45);
      }

      input[type="checkbox"]:checked::after {
        content: "";
        display: block;
        width: 6px;
        height: 11px;
        border: solid #fff;
        border-width: 0 2px 2px 0;
        transform: translate(8px, 3px) rotate(45deg);
      }

      @keyframes sakura-drift-1 {
        0% {
          transform: translate3d(0, -2%, 0) rotate(0deg);
          opacity: 0.85;
        }
        100% {
          transform: translate3d(-3%, 6%, 0) rotate(8deg);
          opacity: 0.55;
        }
      }

      @keyframes sakura-drift-2 {
        0% {
          transform: translate3d(2%, -3%, 0) rotate(0deg);
          opacity: 0.82;
        }
        100% {
          transform: translate3d(4%, 7%, 0) rotate(-9deg);
          opacity: 0.5;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 14px;
        }

        .cursor-glow {
          width: 130px;
          height: 130px;
        }

        #container {
          grid-template-columns: repeat(auto-fill, minmax(24px, 1fr));
          gap: 10px;
          min-height: 72vh;
          padding: 16px;
        }

        input[type="checkbox"] {
          width: 22px;
          height: 22px;
          border-radius: 4px;
        }

        input[type="checkbox"]:checked::after {
          width: 5px;
          height: 10px;
          transform: translate(7px, 2px) rotate(45deg);
        }
      }
    </style>
</head>
<body>
  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="error-banner" id="errorBanner" role="alert" aria-live="polite"></div>
  <h1>Check Boxes</h1>

  <div class="top-actions">
    <a class="location-btn" href="/location.html">See Everyones Location</a>
  </div>

  <div id="container">





<!-- MY JAVASCRIPT  -->
 <script src="/socket.io/socket.io.js"></script>
    <script>
     
      const container = document.getElementById('container');
      const authToken = localStorage.getItem('authToken');
      const socket = authToken ? io({ auth: { token: authToken } }) : io();
      const box_count=100;
      const errorBanner = document.getElementById('errorBanner');
      let errorBannerTimer = null;


    //// ERROR HANDEL on FRONTE
      function showErrorBanner(message) {
        console.debug('showErrorBanner called with:', message);
        // clear any pending timer
        if (errorBannerTimer) {
          clearTimeout(errorBannerTimer);
          errorBannerTimer = null;
        }

        // set message
        errorBanner.innerHTML = `<strong>Error</strong><span>${message}</span>`;

        // make sure transitions are applied to inline opacity for reliability
        errorBanner.style.transition = 'opacity 0.22s ease, transform 0.22s ease';

        // ensure it's hidden first so we can re-show it (force reflow)
        errorBanner.style.opacity = '0';
        errorBanner.style.pointerEvents = 'none';
        // force reflow
        // eslint-disable-next-line no-unused-expressions
        void errorBanner.offsetWidth;

        // show
        errorBanner.style.opacity = '1';
        errorBanner.style.pointerEvents = 'auto';

        // hide after delay and clear timer
        errorBannerTimer = setTimeout(() => {
          errorBanner.style.opacity = '0';
          errorBanner.style.pointerEvents = 'none';
          errorBannerTimer = null;
        }, 2500);
      }


      

     socket.on("server:error",(data)=>{
      console.debug('server:error received', data);
      const errorMessage = data && (data.error || data.message) || "An error occurred";
      showErrorBanner(errorMessage);
     })

    socket.on("server:check:clicked",(data)=>{
        console.log("Data from server: ",data)
        //Find the checkbox with index and update its state
        const {index,checked}=data;
        const input = document.getElementById(`checkbox-${index}`);
        if (input) {
            input.checked = checked;
        }
      })


      async function fetchStateFromServer(){

        while(container.firstChild){
          container.removeChild(container.firstChild);  
        }

         const response = await fetch("/checkboxes",{method:'GET'});
        const data=await response.json();
      
           if(data && data.checkboxes){
          // Create checkboxes based on the state received from the server     
            data.checkboxes.forEach((serverValue,index)=>{
               const input = document.createElement('input');
                input.type='checkbox';
                 input.id=`checkbox-${index}`;
                  input.checked=serverValue;
                 
         // Listen for change event on each checkbox and emit the event to server with index and checked state        
        input.addEventListener('change',(e)=>{
        const checked=e.target.checked;
        const previousChecked = !checked;
        // if(checked){
        //   console.log("Checked",{index , checked});
        // }else{
        //   console.log("UnChecked",{index , checked});
        // }

        socket.emit("client:check:clicked",{index,checked},(response)=>{
          if (!response || !response.ok) {
            const rollbackValue = response && typeof response.checked === 'boolean'
              ? response.checked
              : previousChecked;

            input.checked = rollbackValue;

            const message = response && response.error
              ? response.error
              : "Please wait for some time";

            showErrorBanner(message);

            if (response && response.error && response.error.toLowerCase().includes('unauthorized')) {
              localStorage.setItem('postLoginRedirect', '/index.html');
              window.location.href = '/o/authenticate';
            }
            return;
          }

          if (typeof response.checked === 'boolean') {
            input.checked = response.checked;
          }
        });

       })

       container.appendChild(input);
        })
      }
        
      }
window.addEventListener("load",async ()=>{
         fetchStateFromServer();
     
   })



    </script>
  </div>




  <script>
    const cursorGlow = document.getElementById('cursorGlow');
    let petalFrameLocked = false;

    document.addEventListener('mousemove', (event) => {
      cursorGlow.style.opacity = '1';
      cursorGlow.style.left = event.clientX + 'px';
      cursorGlow.style.top = event.clientY + 'px';

      if (petalFrameLocked) {
        return;
      }

      petalFrameLocked = true;
      requestAnimationFrame(() => {
        createPetal(event.clientX, event.clientY);
        petalFrameLocked = false;
      });
    });

    document.addEventListener('mouseleave', () => {
      cursorGlow.style.opacity = '0';
    });

    function createPetal(x, y) {
      const petal = document.createElement('span');
      petal.className = 'petal';

      const driftX = (Math.random() * 44 - 22).toFixed(0) + 'px';
      const driftY = (Math.random() * 40 + 20).toFixed(0) + 'px';
      const rotation = (Math.random() * 160 - 80).toFixed(0) + 'deg';
      const size = 8 + Math.random() * 8;

      petal.style.left = x + 'px';
      petal.style.top = y + 'px';
      petal.style.width = size + 'px';
      petal.style.height = Math.max(6, size - 2) + 'px';
      petal.style.setProperty('--drift-x', driftX);
      petal.style.setProperty('--drift-y', driftY);
      petal.style.setProperty('--rot', rotation);

      document.body.appendChild(petal);
      petal.addEventListener('animationend', () => petal.remove(), { once: true });
    }
  </script>
    
    
</body>
</html>
